name: financeflow
description: Personal Finance Tracker
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  path: ^1.9.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  fl_chart: ^0.67.0
  http: ^1.2.0
  google_sign_in: ^6.2.1
  flutter_animate: ^4.5.0
  intl: ^0.19.0
  uuid: ^4.3.3
  cupertino_icons: ^1.0.6
  share_plus: ^7.2.2
  file_picker: ^6.1.1
  pdf: ^3.10.8
  printing: ^5.12.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
  fonts:
    - family: NotoSansBengali
      fonts:
        - asset: assets/fonts/NotoSansBengali-Regular.ttf
        - asset: assets/fonts/NotoSansBengali-Bold.ttf
          weight: 700
